#
# NuVatis 샘플 프로젝트 Docker Compose
# PostgreSQL 데이터베이스 실행
#
# 작성자: 최진호
# 작성일: 2026-03-01
#

services:
  postgres:
    image: postgres:17-alpine
    container_name: nuvatis-sample-db
    environment:
      POSTGRES_USER: nuvatis
      POSTGRES_PASSWORD: nuvatis123
      POSTGRES_DB: nuvatis_sample
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nuvatis -d nuvatis_sample"]
      interval: 5s
      timeout: 3s
      retries: 5

  # 벤치마크용 PostgreSQL (대용량 데이터, 고성능 설정)
  postgres-benchmark:
    image: postgres:17-alpine
    container_name: nuvatis-benchmark-db
    environment:
      POSTGRES_USER: nuvatis
      POSTGRES_PASSWORD: nuvatis123
      POSTGRES_DB: benchmark
    ports:
      - "5433:5432"
    volumes:
      - benchmark_data:/var/lib/postgresql/data
      - ./database/benchmark-schema.sql:/docker-entrypoint-initdb.d/01-benchmark-schema.sql
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=1GB"
      - "-c"
      - "effective_cache_size=3GB"
      - "-c"
      - "work_mem=64MB"
      - "-c"
      - "maintenance_work_mem=512MB"
      - "-c"
      - "max_connections=100"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nuvatis -d benchmark"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 4GB
        reservations:
          memory: 2GB

volumes:
  postgres_data:
  benchmark_data:
